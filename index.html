<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God’s Child Mode</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: radial-gradient(circle at center, #111, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

.container {
  max-width: 420px;
  padding: 20px;
}

h1 {
  font-size: 26px;
  animation: fadeIn 1s ease;
}

.status {
  margin: 15px 0;
  font-weight: bold;
  color: #00ffcc;
  animation: glow 2s infinite alternate;
}

button {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #1c1c1c;
  color: white;
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
  background: #333;
}

.hidden {
  display: none;
}

.message {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.5;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes glow {
  from {text-shadow: 0 0 5px #00ffcc;}
  to {text-shadow: 0 0 20px #00ffcc;}
}

.tapZone {
  position: fixed;
  inset: 0;
}

.counter {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

  <div id="main">
    <h1 id="title">😤✝️ ayo twin...</h1>
    <p id="subtitle">what are we doing 😭</p>

    <div class="status">Status: Child of God 👑</div>

    <button onclick="pray()">🙏 Pray</button>
    <button onclick="resetMode()">💪 Reset</button>
    <button onclick="chill()">🧠 Chill</button>
  </div>

  <div id="output" class="hidden">
    <div id="text" class="message"></div>
    <div class="counter" id="counter"></div>
    <button onclick="back()">⬅ Back</button>
  </div>

</div>

<div class="tapZone" onclick="tapEffect()"></div>

<script>
const main = document.getElementById("main");
const output = document.getElementById("output");
const text = document.getElementById("text");
const counter = document.getElementById("counter");

let taps = 0;

const funnyLines = [
  "bro really thought 💀",
  "nah we’re better than this 😭✝️",
  "God watching like 👀",
  "mission almost failed but we good 😤",
  "LOCK IN SOLDIER 🗿"
];

function randomLine() {
  return funnyLines[Math.floor(Math.random() * funnyLines.length)];
}

function show(msg) {
  main.classList.add("hidden");
  output.classList.remove("hidden");
  text.innerText = msg + "\n\n" + randomLine();
}

function pray() {
  show("🙏 Jesus, keep me close.\n\nYou’re still chosen.");
}

function resetMode() {
  let seconds = 10;
  show("💪 Resetting...\nBreathe with me.");

  counter.innerText = "10";

  let interval = setInterval(() => {
    seconds--;
    counter.innerText = seconds;

    if (seconds <= 0) {
      clearInterval(interval);
      text.innerText = "You’re back in control 😤🔥";
      counter.innerText = "";
    }
  }, 1000);
}

function chill() {
  show("😂 relax twin...\nGod’s got you.\nGo live your life fr.");
}

function back() {
  output.classList.add("hidden");
  main.classList.remove("hidden");
  counter.innerText = "";
}

function tapEffect() {
  taps++;
  if (taps % 5 === 0) {
    document.body.style.background = "radial-gradient(circle, #1a1a1a, #000)";
  }
}
</script>

</body>
</html>
